name: Release Desktop App

on:
  push:
    tags:
      - 'desktop-v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: '--target aarch64-apple-darwin'
            label: 'mac-apple-silicon'
          - os: macos-13
            args: '--target x86_64-apple-darwin'
            label: 'mac-intel'
          - os: ubuntu-22.04
            args: ''
            label: 'linux'
          - os: windows-latest
            args: ''
            label: 'windows'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.os, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './apps/desktop/src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'memeBucket Picker ${{ github.ref_name }}'
          releaseBody: |
            ## Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `.dmg` ending in `aarch64` |
            | macOS (Intel) | `.dmg` ending in `x86_64` |
            | Windows | `.msi` installer |
            | Linux | `.AppImage` or `.deb` |

            > **macOS users:** Right-click → Open on first launch if you see a security warning (app is not notarized).
          releaseDraft: true
          prerelease: false
          projectPath: './apps/desktop'
          args: ${{ matrix.args }}
