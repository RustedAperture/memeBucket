name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-and-sast:
    name: Test and SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # --- Rust Setup ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      # --- Tauri Linux dependencies (required by desktop crate in workspace) ---
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      # --- Rust Tests & SAST (Linters, Security Audit) ---
      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (Rust SAST / Linter)
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        run: cargo test
        env:
          MEMEBUCKET_ALLOW_LOCAL_IPS_IN_TESTS: "true"

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
        
      - name: Run cargo-audit (Rust SCA / Vulnerability check)
        run: cargo audit --ignore RUSTSEC-2023-0071

      # --- TypeScript Setup ---
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'

      - name: Install NPM dependencies
        working-directory: apps/web
        run: npm ci

      # --- TypeScript SAST ---
      - name: Run Bearer (SAST for TS/JS)
        uses: bearer/bearer-action@v2

  build-and-push:
    name: Build and Push Docker image
    needs: test-and-sast
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
